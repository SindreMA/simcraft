name: Deploy to Hetzner

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Publish Docker Image"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/sortbek/simcraft:latest

            # Stop existing container if running
            docker stop simhammer 2>/dev/null || true
            docker rm simhammer 2>/dev/null || true

            # Run standalone image
            docker run -d --name simhammer --restart unless-stopped \
              -p 8000:8000 \
              -v simhammer-data:/app/resources/data \
              -v simhammer-data-full:/app/resources/data_full \
              -v simhammer-simc:/app/resources/simc \
              -v simhammer-db:/app/db \
              ghcr.io/sortbek/simcraft:latest

            docker image prune -f
